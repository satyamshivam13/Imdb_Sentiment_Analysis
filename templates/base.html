<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}{% block title_suffix %}{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Space Grotesk"', "sans-serif"],
              body: ['"Sora"', "sans-serif"],
            },
            colors: {
              midnight: "#0b0f1a",
              ember: "#f97316",
              aura: "#22d3ee",
              haze: "#a78bfa",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body class="font-body text-slate-100">
    <div class="bg-blobs"></div>
    <div class="relative z-10 min-h-screen">
      <header class="px-6 pt-6">
        <div
          class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4"
        >
          <div class="flex items-center gap-4">
            <div
              class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-ember/90 via-amber-400 to-aura/90 text-midnight shadow-lg"
            >
              <span class="font-display text-lg font-bold">IM</span>
            </div>
            <div>
              <p class="text-xs uppercase tracking-[0.45em] text-cyan-200/70">
                Sentiment Studio
              </p>
              <h1 class="font-display text-lg font-semibold">{{ app_name }}</h1>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-2 text-sm text-slate-300">
            <a class="nav-pill" href="{{ url_for('home') }}">Home</a>
            <a class="nav-pill" href="{{ url_for('dashboard') }}">Dashboard</a>
            <a class="nav-pill" href="{{ url_for('metrics_page') }}">Metrics</a>
            <a class="nav-pill" href="{{ url_for('history') }}">History</a>
            <span class="hidden sm:inline">Made by {{ author }}</span>
          </div>
        </div>
      </header>

      {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
